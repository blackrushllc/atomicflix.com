<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch | AtomicFlix</title>
    <link rel="stylesheet" href="assets/css/main.css">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="video.episode">
    <meta property="og:url" id="og-url" content="">
    <meta property="og:title" id="og-title" content="AtomicFlix | Retro Sci-Fi Streaming">
    <meta property="og:description" id="og-description" content="Classic futures, restored and re-serialized for modern screens.">
    <meta property="og:image" id="og-image" content="assets/banners/city-at-worlds-end/cover.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" id="twitter-url" content="">
    <meta property="twitter:title" id="twitter-title" content="AtomicFlix | Retro Sci-Fi Streaming">
    <meta property="twitter:description" id="twitter-description" content="Classic futures, restored and re-serialized for modern screens.">
    <meta property="twitter:image" id="twitter-image" content="assets/banners/city-at-worlds-end/cover.jpg">
</head>
<body class="watch-page">
    <header class="scrolled" style="background: rgba(0,0,0,0.9);">
        <a href="index.html" class="logo">AtomicFlix</a>
        <button class="nav-toggle" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a id="back-link" href="#">← Back</a></li>
            </ul>
        </nav>
    </header>

    <main class="watch-container" id="watch-main">
        <div class="video-wrapper" id="video-area">
            <video id="player" controls autoplay poster="">
                <source id="video-source" src="" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            
            <div id="auto-next-overlay" class="overlay" style="display: none;">
                <div class="overlay-content">
                    <p>Up Next</p>
                    <h2 id="next-title">Next Episode Title</h2>
                    <div class="next-preview" id="next-preview-container">
                        <!-- Thumbnail injected here -->
                    </div>
                    <div class="countdown" id="countdown-timer">10</div>
                    <div class="overlay-actions">
                        <button id="play-next-btn" class="btn btn-primary">Play Next Now</button>
                        <button id="cancel-next-btn" class="btn btn-secondary" style="margin-left:0">Cancel</button>
                    </div>
                </div>
            </div>

            <div id="series-end-overlay" class="overlay" style="display: none;">
                <div class="overlay-content">
                    <p>End of Serial</p>
                    <h2 id="end-series-title">Series Title</h2>
                    <p style="text-transform: none; font-family: var(--font-main); margin-bottom: 2rem;">You've reached the end of this available serial.</p>
                    <div class="overlay-actions">
                        <button id="end-back-btn" class="btn btn-primary">Back to Chapters</button>
                        <a href="index.html#series" class="btn btn-secondary" style="margin-left:0">Browse More</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="watch-meta">
            <div class="watch-context-line">
                <span id="watch-context">Series Name</span>
                <span class="separator">/</span>
                <span id="watch-runtime">00:00</span>
                <button id="share-btn" class="btn-share" aria-label="Share">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                    <span>Share</span>
                </button>
            </div>
            <h1 id="watch-title">Loading...</h1>
            <p id="watch-description" class="detail-description"></p>
            
            <div id="share-menu" class="share-menu" style="display: none;">
                <div class="share-menu-header">
                    <h3>Share this video</h3>
                    <button id="close-share-btn" aria-label="Close">&times;</button>
                </div>
                <div class="share-options">
                    <button class="share-option" data-platform="copy">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        <span>Copy Link</span>
                    </button>
                    <button class="share-option" data-platform="twitter">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
                        <span>X / Twitter</span>
                    </button>
                    <button class="share-option" data-platform="facebook">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path></svg>
                        <span>Facebook</span>
                    </button>
                </div>
                <div id="share-toast" class="share-toast" style="display: none;">Link copied to clipboard!</div>
            </div>
        </div>

        <div class="watch-nav" id="watch-nav">
            <div class="nav-group">
                <a id="prev-btn" href="#" class="btn btn-secondary" style="margin-left:0">← Previous Episode</a>
                <a id="next-btn" href="#" class="btn btn-secondary" style="margin-left:0">Next Episode →</a>
            </div>
            <div class="nav-group">
                <a id="list-btn" href="#" class="btn btn-secondary" style="margin-left:0">Back to List</a>
            </div>
        </div>
    </main>

    <script type="module">
        import { loadLibrary, getSeriesById, getChapterBySeriesAndNumber, getNextChapter, getPreviousChapter, getBlitzById } from './assets/js/data-loader.js';
        import { initMobileMenu } from './assets/js/ui.js';

        let countdownInterval;
        let nextChapterData = null;
        let currentSeriesId = null;
        let shareData = {
            title: '',
            text: '',
            url: ''
        };

        async function init() {
            initMobileMenu();
            await loadLibrary();
            const params = new URLSearchParams(window.location.search);
            const seriesId = params.get('series');
            const chapterNum = params.get('chapter');
            const blitzId = params.get('blitz');

            if (blitzId) {
                renderBlitz(blitzId);
            } else if (seriesId && chapterNum) {
                renderChapter(seriesId, chapterNum);
            } else {
                showError();
            }
            
            initShare();
            
            // Handle escape key to cancel auto-next
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    cancelAutoNext();
                }
            });
        }

        function renderChapter(seriesId, chapterNum) {
            currentSeriesId = seriesId;
            const series = getSeriesById(seriesId);
            const chapter = getChapterBySeriesAndNumber(seriesId, chapterNum);

            if (!series || !chapter) {
                showError();
                return;
            }

            document.title = `${series.title} - Ch ${chapter.number} | AtomicFlix`;
            document.getElementById('watch-title').textContent = `Episode ${chapter.number}: ${chapter.title}`;
            document.getElementById('watch-context').textContent = series.title;
            document.getElementById('watch-runtime').textContent = chapter.runtime;
            document.getElementById('watch-description').textContent = chapter.description;
            
            const backUrl = `series.html?id=${seriesId}`;
            document.getElementById('back-link').href = backUrl;
            document.getElementById('back-link').textContent = `← Back to ${series.title}`;
            document.getElementById('list-btn').href = backUrl;

            setupPlayer(chapter.video, chapter.thumbnail, chapter.videoType || 'native');
            setupNavigation(seriesId, chapter.number);
            
            // Update Share Data & Meta
            const fullTitle = `${series.title} - Episode ${chapter.number}: ${chapter.title}`;
            shareData = {
                title: fullTitle,
                text: chapter.description,
                url: window.location.href
            };
            updateMeta(fullTitle, chapter.description, chapter.thumbnail);

            // Save Progress
            localStorage.setItem(`atomicflix_last_series`, seriesId);
            localStorage.setItem(`atomicflix_last_chapter_${seriesId}`, chapterNum);
        }

        function renderBlitz(blitzId) {
            const blitz = getBlitzById(blitzId);
            if (!blitz) {
                showError();
                return;
            }

            document.title = `${blitz.title} | AtomicFlix`;
            document.getElementById('watch-title').textContent = blitz.title;
            document.getElementById('watch-context').textContent = blitz.creator;
            document.getElementById('watch-runtime').textContent = blitz.runtime;
            document.getElementById('watch-description').textContent = blitz.description;
            
            const backUrl = `index.html#blitz`;
            document.getElementById('back-link').href = backUrl;
            document.getElementById('back-link').textContent = `← Back to Blitz`;
            document.getElementById('list-btn').href = backUrl;
            document.getElementById('list-btn').textContent = 'Back to Blitz';
            
            document.getElementById('prev-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';

            setupPlayer(blitz.video, blitz.thumbnail, blitz.videoType || 'native');

            // Update Share Data & Meta
            shareData = {
                title: blitz.title,
                text: blitz.description,
                url: window.location.href
            };
            updateMeta(blitz.title, blitz.description, blitz.thumbnail);
        }

        function updateMeta(title, description, image) {
            const url = window.location.href;
            const absoluteImage = image ? (image.startsWith('http') ? image : window.location.origin + '/' + image) : '';

            // Update Title
            document.title = `${title} | AtomicFlix`;

            // OG Tags
            document.getElementById('og-title').setAttribute('content', title);
            document.getElementById('og-description').setAttribute('content', description);
            document.getElementById('og-url').setAttribute('content', url);
            document.getElementById('og-image').setAttribute('content', absoluteImage);

            // Twitter Tags
            document.getElementById('twitter-title').setAttribute('content', title);
            document.getElementById('twitter-description').setAttribute('content', description);
            document.getElementById('twitter-url').setAttribute('content', url);
            document.getElementById('twitter-image').setAttribute('content', absoluteImage);
        }

        function initShare() {
            const shareBtn = document.getElementById('share-btn');
            const shareMenu = document.getElementById('share-menu');
            const closeBtn = document.getElementById('close-share-btn');
            const options = document.querySelectorAll('.share-option');

            if (!shareBtn) return;

            shareBtn.addEventListener('click', async () => {
                if (navigator.share) {
                    try {
                        await navigator.share(shareData);
                    } catch (err) {
                        if (err.name !== 'AbortError') {
                            console.error('Error sharing:', err);
                            toggleShareMenu();
                        }
                    }
                } else {
                    toggleShareMenu();
                }
            });

            closeBtn.addEventListener('click', toggleShareMenu);

            options.forEach(opt => {
                opt.addEventListener('click', () => {
                    const platform = opt.getAttribute('data-platform');
                    handleShareAction(platform);
                });
            });

            // Close on click outside
            window.addEventListener('click', (e) => {
                if (shareMenu.style.display === 'block' && !shareMenu.contains(e.target) && e.target !== shareBtn && !shareBtn.contains(e.target)) {
                    toggleShareMenu();
                }
            });
        }

        function toggleShareMenu() {
            const menu = document.getElementById('share-menu');
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }

        function handleShareAction(platform) {
            const { title, text, url } = shareData;
            const encodedUrl = encodeURIComponent(url);
            const encodedTitle = encodeURIComponent(title);

            switch (platform) {
                case 'copy':
                    navigator.clipboard.writeText(url).then(() => {
                        const toast = document.getElementById('share-toast');
                        toast.style.display = 'block';
                        setTimeout(() => { toast.style.display = 'none'; }, 2000);
                    });
                    break;
                case 'twitter':
                    window.open(`https://twitter.com/intent/tweet?text=${encodedTitle}&url=${encodedUrl}`, '_blank');
                    break;
                case 'facebook':
                    window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`, '_blank');
                    break;
            }
        }

        function setupPlayer(videoUrl, posterUrl, videoType = 'native') {
            const videoArea = document.getElementById('video-area');
            let player = document.getElementById('player');

            if (videoType === 'youtube') {
                if (player && player.tagName === 'VIDEO') {
                    const iframe = document.createElement('iframe');
                    iframe.id = 'player';
                    videoArea.replaceChild(iframe, player);
                    player = iframe;
                }
                
                player.src = videoUrl;
                player.title = "YouTube video player";
                player.setAttribute('frameborder', '0');
                player.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
                player.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
                player.setAttribute('allowfullscreen', '');
                return;
            }

            // Native Player
            if (player && player.tagName === 'IFRAME') {
                const video = document.createElement('video');
                video.id = 'player';
                video.controls = true;
                video.autoplay = true;
                videoArea.replaceChild(video, player);
                player = video;
            }

            let source = document.getElementById('video-source');
            if (!source) {
                source = document.createElement('source');
                source.id = 'video-source';
                source.type = 'video/mp4';
                player.appendChild(source);
            }
            
            source.src = videoUrl;
            
            // Check poster
            if (posterUrl) {
                const posterImg = new Image();
                posterImg.onerror = () => {
                    console.error(`Media missing: ${posterUrl}`);
                    player.poster = ''; 
                };
                posterImg.src = posterUrl;
            }
            player.poster = posterUrl || '';
            
            // Handle missing video
            player.onerror = () => {
                console.error(`Media missing: ${videoUrl}`);
                videoArea.innerHTML = `
                    <div class="media-placeholder">
                        <div style="font-size: 2rem; margin-bottom: 1rem;">Video File Missing</div>
                        <div style="font-size: 1rem; text-transform: none; opacity: 0.8;">${videoUrl}</div>
                    </div>
                `;
            };

            player.onended = () => {
                const params = new URLSearchParams(window.location.search);
                const seriesId = params.get('series');
                const chapterNum = params.get('chapter');
                
                if (seriesId && chapterNum) {
                    const next = getNextChapter(seriesId, chapterNum);
                    if (next) {
                        showAutoNext(next);
                    } else {
                        showSeriesEnd();
                    }
                }
            };
            
            player.ontimeupdate = () => {
                const params = new URLSearchParams(window.location.search);
                const seriesId = params.get('series');
                const chapterNum = params.get('chapter');
                const blitzId = params.get('blitz');
                
                if (player.currentTime > 5) {
                    const progressKey = blitzId ? `progress_blitz_${blitzId}` : `progress_${seriesId}_${chapterNum}`;
                    localStorage.setItem(progressKey, player.currentTime);
                }
            };

            player.onloadedmetadata = () => {
                const params = new URLSearchParams(window.location.search);
                const seriesId = params.get('series');
                const chapterNum = params.get('chapter');
                const blitzId = params.get('blitz');
                const progressKey = blitzId ? `progress_blitz_${blitzId}` : `progress_${seriesId}_${chapterNum}`;
                const savedTime = localStorage.getItem(progressKey);
                
                if (savedTime && parseFloat(savedTime) < player.duration - 10) {
                    player.currentTime = parseFloat(savedTime);
                }
            };

            player.load();
        }

        function setupNavigation(seriesId, chapterNum) {
            const prev = getPreviousChapter(seriesId, chapterNum);
            const next = getNextChapter(seriesId, chapterNum);
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            if (prev) {
                prevBtn.href = `watch.html?series=${seriesId}&chapter=${prev.number}`;
                prevBtn.style.visibility = 'visible';
            } else {
                prevBtn.style.visibility = 'hidden';
            }

            if (next) {
                nextBtn.href = `watch.html?series=${seriesId}&chapter=${next.number}`;
                nextBtn.style.visibility = 'visible';
            } else {
                nextBtn.style.visibility = 'hidden';
            }
        }

        function showAutoNext(next) {
            nextChapterData = next;
            const overlay = document.getElementById('auto-next-overlay');
            const timerDisplay = document.getElementById('countdown-timer');
            const nextTitle = document.getElementById('next-title');
            const previewContainer = document.getElementById('next-preview-container');
            
            nextTitle.textContent = `Episode ${next.number}: ${next.title}`;
            
            if (next.thumbnail) {
                previewContainer.innerHTML = `<img src="${next.thumbnail}" alt="${next.title}" onerror="console.error('Media missing: ${next.thumbnail}'); this.replaceWith(createOverlayPlaceholder())">`;
            } else {
                previewContainer.innerHTML = createOverlayPlaceholder();
            }

            overlay.style.display = 'flex';
            
            let timeLeft = 10;
            timerDisplay.textContent = timeLeft;
            
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    playNext();
                }
            }, 1000);

            document.getElementById('play-next-btn').onclick = playNext;
            document.getElementById('cancel-next-btn').onclick = cancelAutoNext;
        }

        function cancelAutoNext() {
            clearInterval(countdownInterval);
            document.getElementById('auto-next-overlay').style.display = 'none';
        }

        function playNext() {
            window.location.href = `watch.html?series=${currentSeriesId}&chapter=${nextChapterData.number}`;
        }

        function createOverlayPlaceholder() {
            return `<div class="media-placeholder" style="margin:0 auto;">Missing Thumb</div>`;
        }

        function showSeriesEnd() {
            const overlay = document.getElementById('series-end-overlay');
            const series = getSeriesById(currentSeriesId);
            document.getElementById('end-series-title').textContent = series ? series.title : 'Series';
            overlay.style.display = 'flex';
            document.getElementById('end-back-btn').onclick = () => {
                window.location.href = `series.html?id=${currentSeriesId}`;
            };
        }

        function showError() {
            document.getElementById('watch-main').innerHTML = `
                <div class="error-state">
                    <h1>404</h1>
                    <h2>CONTENT NOT FOUND</h2>
                    <p style="margin-bottom: 2rem;">The transmission has been lost or the coordinates are invalid.</p>
                    <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                        <a href="index.html" class="btn btn-primary">Return Home</a>
                        <a href="index.html#series" class="btn btn-secondary" style="margin-left:0">Browse Series</a>
                    </div>
                </div>
            `;
        }

        init();
    </script>
</body>
</html>
