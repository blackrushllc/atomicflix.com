<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suggest a Book | AtomicFlix</title>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <header class="scrolled">
        <div class="logo-group">
            <a href="index.html" class="logo">AtomicFlix</a>
            <span class="logo-caption">New to You. Recapped</span>
        </div>
        <button class="nav-toggle" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#series">Series</a></li>
                <li><a href="index.html#blitz">Blitz</a></li>
                <li><a href="contributors.html">Contributors</a></li>
                <li><a href="suggest.html">Suggest a Book</a></li>
            </ul>
        </nav>
    </header>

    <main class="static-page">
        <h1 id="page-title">Suggest a Book</h1>
        <p id="page-intro" class="page-intro"></p>
        
        <div class="content-box">
            <h2>Submission Guidelines</h2>
            <ul id="guidelines-list" class="guidelines-list">
                <!-- Guidelines injected here -->
            </ul>
        </div>

        <div class="content-box">
            <h2>Send Your Suggestion</h2>
            <p id="contact-message" style="margin: 1rem 0;"></p>
            <div class="contact-details">
                <p>Email: <span id="contact-email"></span></p>
                <p>Social: <span id="contact-social"></span></p>
            </div>
            <p id="page-notes" class="page-notes"></p>
        </div>
    </main>

    <footer>
        <div class="logo">AtomicFlix</div>
        <p>&copy; 2026 AtomicFlix. All rights reserved.</p>
    </footer>

    <script type="module">
        import { loadLibrary, getSuggestBookContent } from './assets/js/data-loader.js';
        import { initMobileMenu } from './assets/js/ui.js';

        async function init() {
            initMobileMenu();
            await loadLibrary();
            const content = getSuggestBookContent();

            document.getElementById('page-title').textContent = content.title;
            document.getElementById('page-intro').innerHTML = content.intro;
            
            const guidelinesList = document.getElementById('guidelines-list');
            content.guidelines.forEach(guide => {
                const li = document.createElement('li');
                li.textContent = guide;
                li.style.marginBottom = '0.5rem';
                guidelinesList.appendChild(li);
            });

            document.getElementById('contact-message').innerHTML = content.contact.message;
            document.getElementById('contact-email').textContent = content.contact.email;
            document.getElementById('contact-social').textContent = content.contact.socialDm;
            document.getElementById('page-notes').innerHTML = content.notes;
        }

        init();
    </script>
</body>
</html>
