<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contributors | AtomicFlix</title>
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <header class="scrolled">
        <a href="index.html" class="logo">AtomicFlix</a>
        <button class="nav-toggle" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#series">Series</a></li>
                <li><a href="index.html#blitz">Blitz</a></li>
                <li><a href="contributors.html">Contributors</a></li>
                <li><a href="suggest.html">Suggest a Book</a></li>
            </ul>
        </nav>
    </header>

    <main class="static-page">
        <h1 id="page-title">Contributors</h1>
        <p id="page-intro" class="page-intro"></p>
        
        <div class="content-box">
            <h2>Areas of Contribution</h2>
            <ul id="areas-list" class="grid-list">
                <!-- Areas injected here -->
            </ul>
        </div>

        <div class="content-box">
            <h2>Tech Stack</h2>
            <table class="tech-table">
                <tbody id="techstack-body">
                    <!-- Tech stack items injected here -->
                </tbody>
            </table>
        </div>

        <div class="content-box">
            <h2>Workflow</h2>
            <table class="tech-table">
                <tbody id="workflow-body">
                    <!-- Workflow items injected here -->
                </tbody>
            </table>
        </div>

        <div class="content-box">
            <h2>Contact Us</h2>
            <p id="contact-message" style="margin: 1rem 0;"></p>
            <div class="contact-details">
                <p>Email: <span id="contact-email"></span></p>
                <p>Social: <span id="contact-social"></span></p>
            </div>
        </div>
    </main>

    <footer>
        <div class="logo">AtomicFlix</div>
        <p>&copy; 2026 AtomicFlix. All rights reserved.</p>
    </footer>

    <script type="module">
        import { loadLibrary, getContributorsContent } from './assets/js/data-loader.js';
        import { initMobileMenu } from './assets/js/ui.js';

        async function init() {
            initMobileMenu();
            await loadLibrary();
            const content = getContributorsContent();

            document.getElementById('page-title').textContent = content.title;
            document.getElementById('page-intro').textContent = content.intro;
            
            const areasList = document.getElementById('areas-list');
            content.areas.forEach(area => {
                const li = document.createElement('li');
                li.textContent = `• ${area}`;
                areasList.appendChild(li);
            });

            const techstackBody = document.getElementById('techstack-body');
            if (content.techstack) {
                content.techstack.forEach(tech => {
                    const tr = document.createElement('tr');
                    const td = document.createElement('td');
                    td.textContent = tech;
                    tr.appendChild(td);
                    techstackBody.appendChild(tr);
                });
            }

            const workflowBody = document.getElementById('workflow-body');
            if (content.workflow) {
                content.workflow.forEach(item => {
                    const tr = document.createElement('tr');
                    const td = document.createElement('td');
                    td.textContent = item;
                    tr.appendChild(td);
                    workflowBody.appendChild(tr);
                });
            }

            document.getElementById('contact-message').textContent = content.contact.message;
            document.getElementById('contact-email').textContent = content.contact.email;
            document.getElementById('contact-social').textContent = content.contact.socialDm;
        }

        init();
    </script>
</body>
</html>
